<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Order Extractor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            background-color: #f8f9fa;
        }
        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #eee;
            padding-bottom: 0.5rem;
        }
        .upload-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 2px dashed #cbd5e0;
            border-radius: 6px;
            text-align: center;
            background-color: #f7fafc;
        }
        input[type="file"] {
            margin-bottom: 1rem;
        }
        button {
            background-color: #4299e1;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #3182ce;
        }
        button:disabled {
            background-color: #a0aec0;
            cursor: not-allowed;
        }
        .loading {
            display: none;
            margin-top: 1rem;
            color: #4a5568;
            font-style: italic;
        }
        .result-section {
            display: none;
            margin-top: 2rem;
        }
        #copyBtn {
            background-color: #4a5568;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        #copyBtn:hover {
            background-color: #2d3748;
        }
        .error {
            color: #e53e3e;
            background-color: #fff5f5;
            padding: 1rem;
            border-radius: 4px;
            border: 1px solid #feb2b2;
            margin-bottom: 1rem;
            display: none;
        }
        pre {
            background-color: #2d3748;
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Purchase Order Extractor</h1>
        
        <div class="upload-section">
            <form id="uploadForm">
                <input type="file" id="pdfFile" accept="application/pdf" required>
                <br>
                <button type="submit" id="submitBtn">Extract Data</button>
            </form>
            <div id="loading" class="loading">Processing document, please wait...</div>
        </div>

        <div id="errorMsg" class="error"></div>

        <div id="resultSection" class="result-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                <h3 style="margin: 0;">Extraction Result:</h3>
                <button id="copyBtn">Copy JSON</button>
            </div>
            <pre id="jsonResult"></pre>
        </div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fileInput = document.getElementById('pdfFile');
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            const jsonResult = document.getElementById('jsonResult');
            const errorMsg = document.getElementById('errorMsg');

            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // UI feedback
            submitBtn.disabled = true;
            loading.style.display = 'block';
            resultSection.style.display = 'none';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/purchase-order/extract', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.details ? JSON.stringify(data.details, null, 2) : data.error || 'Failed to extract data');
                }

                jsonResult.textContent = JSON.stringify(data, null, 2);
                resultSection.style.display = 'block';
            } catch (error) {
                errorMsg.textContent = 'Error: ' + error.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        });

        const copyBtn = document.getElementById('copyBtn');
        const jsonResult = document.getElementById('jsonResult');
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(jsonResult.textContent)
                .then(() => {
                    const originalText = copyBtn.textContent;
                    copyBtn.textContent = 'Copied!';
                    copyBtn.style.backgroundColor = '#48bb78';
                    setTimeout(() => {
                        copyBtn.textContent = originalText;
                        copyBtn.style.backgroundColor = '#4a5568';
                    }, 2000);
                })
                .catch(err => {
                    alert('Failed to copy JSON: ' + err);
                });
        });
    </script>
</body>
</html>
